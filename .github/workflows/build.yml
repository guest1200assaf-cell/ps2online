name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create placeholder icon if missing
        shell: powershell
        run: |
          if (!(Test-Path "assets")) { New-Item -ItemType Directory -Path "assets" }
          if (!(Test-Path "assets/icon.ico")) {
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/electron/electron/main/shell/browser/resources/win/electron.ico" -OutFile "assets/icon.ico"
            echo "Downloaded placeholder icon"
          } else {
            echo "Icon already exists"
          }

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
          generate_release_notes: true
          body: |
            ## 🎮 Assaf Station — ${{ github.ref_name }}

            ### تحميل
            | الملف | الوصف |
            |-------|-------|
            | `Assaf Station Setup *.exe` | مثبّت Windows (موصى به) |

            ### متطلبات التشغيل
            - Windows 10 / 11 (64-bit)
            - اتصال بالإنترنت للـ Netplay

            ### التثبيت
            1. حمّل ملف `Setup.exe`
            2. شغّله واتبع خطوات التثبيت
            3. شغّل التطبيق وأضف ألعابك
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
